# Cole dentro de C:\xampp\apache\conf\extra\httpd-vhosts.conf
# Depois reinicie o Apache no XAMPP Control Panel

<VirtualHost *:80>
    ServerName descomplicalibras.shop
    ServerAlias www.descomplicalibras.shop

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog "logs/descomplicalibras-error.log"
    CustomLog "logs/descomplicalibras-access.log" common
</VirtualHost>
