name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare
        run: npm run cf:build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://descomplicalibras.shop' }}
          NEXT_PUBLIC_CHECKOUT_BASIC: ${{ vars.NEXT_PUBLIC_CHECKOUT_BASIC || '' }}
          NEXT_PUBLIC_CHECKOUT_COMPLETE: ${{ vars.NEXT_PUBLIC_CHECKOUT_COMPLETE || '' }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
        env:
          HOOPAY_CLIENT_ID: ${{ secrets.HOOPAY_CLIENT_ID }}
          HOOPAY_CLIENT_SECRET: ${{ secrets.HOOPAY_CLIENT_SECRET }}
          HOOPAY_API_URL: https://api.pay.hoopay.com.br
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://descomplicalibras.shop' }}
